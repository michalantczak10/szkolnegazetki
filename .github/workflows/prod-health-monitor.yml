name: Production Health Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check /api/health
        shell: bash
        run: |
          set -euo pipefail
          response="$(curl -fsS https://galaretkarnia.onrender.com/api/health)"
          echo "Health response: $response"

          echo "$response" | grep -q '"status":"ok"'
          echo "$response" | grep -q '"database"'
          echo "$response" | grep -q '"connected":true'
